<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Redirect to login page if not logged in as a PG Owner
        if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'owner') {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                alert('You must be logged in as a PG Owner to post a listing.');
            }
            window.location.href = '../login.html?role=owner';
        }
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userRole = localStorage.getItem('userRole');
            const loginBtn = document.getElementById('navLoginBtn');
            const logoutBtn = document.getElementById('navLogoutBtn');
            const wishlistBtn = document.getElementById('navWishlist');
            if (isLoggedIn) {
                if (loginBtn) loginBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'inline-block';
            } else {
                if (loginBtn) loginBtn.style.display = 'inline-block';
                if (logoutBtn) logoutBtn.style.display = 'none';
            }
            if (userRole === 'owner') {
                if (wishlistBtn) wishlistBtn.style.display = 'none';
            } else {
                if (wishlistBtn) wishlistBtn.style.display = 'inline-block';
            }
        });
        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userRole');
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.reload();
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DiscoverPG – Post your PG. List your paying guest accommodations near top academic institutions.">
    <title>Post Your PG – DiscoverPG</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/about.css">
    <link rel="stylesheet" href="../css/pg_details.css">
    <link rel="stylesheet" href="../css/services.css">
    <link rel="stylesheet" href="../css/STYLE.CSS">
</head>
<body>
    <header class="header">
        <nav class="navbar" aria-label="Main navigation">
            <div class="nav-title">
                <a href="../index.html" class="logo">DiscoverPG</a>
            </div>
            <div class="nav-right">
                <a href="SERVICES.html">Services</a>
                <a href="home.html">Map</a>
                <a href="about.html">About</a>
                <a href="wishlist.html" id="navWishlist">Wishlist</a>
                <a href="post-pg.html" class="btn-post">Post your PG</a>
                <a href="../login.html" id="navLoginBtn">Login / Sign Up</a>
                <a href="#" id="navLogoutBtn" onclick="handleLogout()" style="display: none;">Log Out</a>
            </div>
        </nav>
    </header>

    <main class="post-pg-section">
        <div class="post-pg-wrapper">
            <!-- <div class="post-pg-image"> -->
                <!-- Placeholder area to match Frame 1 layout -->
                <!-- <span>PG Image</span>
            </div> -->

            <form id="postPgForm" class="post-pg-form" autocomplete="on">
                <h1 class="post-pg-title">Post Your PG</h1>
                <p class="post-pg-subtitle">Fill in the details below to create a new PG listing.</p>

                <div class="post-pg-grid">
                    <label class="post-pg-field">
                        <span>PG Name *</span>
                        <input type="text" id="pgName" name="name" placeholder="e.g. Sunrise Boys PG" required>
                    </label>

                    <label class="post-pg-field">
                        <span>Contact No *</span>
                        <input type="tel" id="contactPhone" name="contact_phone" placeholder="e.g. 9876543210" required>
                    </label>

                    <label class="post-pg-field">
                        <span>PG Type *</span>
                        <select id="pgType" name="type" required>
                            <option value="">Select type</option>
                            <option value="boys">Boys</option>
                            <option value="girls">Girls</option>
                            <option value="flat">Flat</option>
                        </select>
                    </label>

                    <label class="post-pg-field">
                        <span>Rent (per month) *</span>
                        <input type="number" id="pgRent" name="rent" min="0" placeholder="Rent in ₹" required>
                    </label>

                    <label class="post-pg-field">
                        <span>Security Deposit</span>
                        <input type="number" id="pgDeposit" name="deposit" min="0" placeholder="Deposit in ₹ (optional)">
                    </label>

                    <label class="post-pg-field">
                        <span>City *</span>
                        <input type="text" id="pgCity" name="city" placeholder="e.g. Delhi" required>
                    </label>

                    <label class="post-pg-field">
                        <span>Area *</span>
                        <input type="text" id="pgArea" name="area" placeholder="e.g. Karol Bagh" required>
                    </label>

                    <label class="post-pg-field">
                        <span>Address *</span>
                        <textarea id="pgAddress" name="address" placeholder="Enter full address details" rows="2" required></textarea>
                    </label>

                    <label class="post-pg-field">
                        <span>Total Beds</span>
                        <input type="number" id="pgTotalBeds" name="total_beds" min="0" placeholder="Total number of beds">
                    </label>

                    <label class="post-pg-field">
                        <span>Vacant Beds</span>
                        <input type="number" id="pgVacantBeds" name="vacant_beds" min="0" placeholder="Available beds">
                    </label>

                    <label class="post-pg-field">
                        <span>Accommodations / Amenities</span>
                        <input type="text" id="accommodations" name="accommodations" placeholder="e.g. WiFi, AC, Geyser, Laundry">
                    </label>

                    <label class="post-pg-field">
                        <span>House Rules</span>
                        <textarea id="pgRules" name="rules" placeholder="e.g. No alcohol, Entry before 10 PM" rows="2"></textarea>
                    </label>

                    <label class="post-pg-field checkbox-field" style="display: flex; flex-direction: row; align-items: center; gap: 0.5rem; margin-top: 1.2rem;">
                        <input type="checkbox" id="pgFoodAvailable" name="food_available" style="width: auto; border-bottom: none; margin: 0; cursor: pointer;">
                        <span style="font-weight: 600;">Food Available</span>
                    </label>

                    <label class="post-pg-field">
                        <span>Upload Images (Select one or more)</span>
                        <input type="file" id="pgImage" accept="image/*" multiple>
                    </label>
                </div>

                <div class="post-pg-actions">
                    <button type="submit" class="btn-post-submit">Submit Listing</button>
                    <p id="postPgMessage" class="post-pg-message" aria-live="polite"></p>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/post-pg.js"></script>
</body>
</html>
