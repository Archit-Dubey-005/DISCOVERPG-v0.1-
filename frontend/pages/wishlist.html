<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Redirect to login page if not authenticated
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '../login.html';
        }
        // Wishlist is ONLY for students/users
        if (localStorage.getItem('userRole') !== 'user') {
            alert('Only students/guests can access the wishlist.');
            window.location.href = '../index.html';
        }
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userRole = localStorage.getItem('userRole');
            const loginBtn = document.getElementById('navLoginBtn');
            const logoutBtn = document.getElementById('navLogoutBtn');
            const wishlistBtn = document.getElementById('navWishlist');
            if (isLoggedIn) {
                if (loginBtn) loginBtn.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'inline-block';
            } else {
                if (loginBtn) loginBtn.style.display = 'inline-block';
                if (logoutBtn) logoutBtn.style.display = 'none';
            }
            if (userRole === 'owner') {
                if (wishlistBtn) wishlistBtn.style.display = 'none';
            }
        });
        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userRole');
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.href = '../index.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist – DiscoverPG</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/about.css">
    <link rel="stylesheet" href="../css/pg_details.css">
    <link rel="stylesheet" href="../css/services.css">
    <link rel="stylesheet" href="../css/STYLE.CSS">
</head>
<body>
    <header class="header">
        <nav class="navbar" aria-label="Main navigation">
            <div class="nav-title">
                <a href="../index.html" class="logo">DiscoverPG</a>
            </div>
            <div class="nav-right">
                <a href="SERVICES.html">Services</a>
                <a href="home.html">Map</a>
                <a href="about.html">About</a>
                <a href="wishlist.html" id="navWishlist">Wishlist</a>
                <a href="post-pg.html" class="btn-post">Post your PG</a>
                <a href="../login.html" id="navLoginBtn">Login / Sign Up</a>
                <a href="#" id="navLogoutBtn" onclick="handleLogout()" style="display: none;">Log Out</a>
            </div>
        </nav>
    </header>
    <div class="container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <h1 style="font-size: 28px; font-weight: bold; color: #333; margin-bottom: 30px;">My Saved PG List</h1>
        <div class="pg-grid" id="pgContainer"></div>
    </div>
    <script src="../js/wishlist.js"></script>
</body>
</html>
