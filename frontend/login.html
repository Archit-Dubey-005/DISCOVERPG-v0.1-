<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DiscoverPG – Login or Sign Up to find the best PG accommodations or manage your properties.">
    <title>Login / Sign Up – DiscoverPG</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/STYLE.CSS">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <!-- Logo Section -->
        <div class="login-logo-container">
            <span class="login-logo">DiscoverPG</span>
        </div>

        <div class="login-card">
            <!-- Mode Switcher (User vs Owner) -->
            <div class="mode-tabs" role="tablist">
                <button type="button" class="tab-btn active" id="tabUser" role="tab" aria-selected="true" onclick="setRole('user')">
                    Student / Guest
                </button>
                <button type="button" class="tab-btn" id="tabOwner" role="tab" aria-selected="false" onclick="setRole('owner')">
                    PG Owner
                </button>
            </div>

            <!-- Header Info -->
            <div class="card-header">
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Please sign in to your student account to continue.</p>
            </div>

            <!-- Alert Message Box -->
            <div id="authAlert" class="auth-alert hidden" role="alert"></div>

            <!-- Auth Form -->
            <form id="authForm" novalidate>
                <!-- Name field (shown only in Signup mode) -->
                <div class="input-group hidden" id="nameFieldGroup">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="Enter your full name" autocomplete="username">
                    </div>
                </div>

                <!-- Email Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-auth-submit" id="btnSubmit">
                    Sign In
                </button>
            </form>



            <!-- Toggle between Login and Signup -->
            <div class="card-footer">
                <span id="footerText">Don't have an account?</span>
                <button type="button" class="btn-toggle-link" id="toggleActionLink" onclick="toggleFormMode()">
                    Sign Up
                </button>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
